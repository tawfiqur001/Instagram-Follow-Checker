<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Instagram Followers Checker</title>

<style>

:root{
    --bg:#0f1115;
    --card:#171b21;
    --surface:#1f252d;
    --border:#2b3440;
    --accent:#4f8cff;
    --text:#f5f7fa;
    --muted:#98a2b3;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Inter,Segoe UI,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 24px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:32px;
}

h1{
    margin:0;
    text-align:center;
    font-size:34px;
    font-weight:700;
    letter-spacing:-0.5px;
}

.subtitle{
    text-align:center;
    color:var(--muted);
    margin-top:10px;
    margin-bottom:35px;
}

.uploads{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
}

.upload-box{
    background:var(--surface);
    border:2px dashed var(--border);
    border-radius:18px;
    padding:35px 20px;
    text-align:center;
    transition:.25s;
}

.upload-box:hover{
    border-color:var(--accent);
}

.upload-icon{
    font-size:42px;
    margin-bottom:12px;
}

.upload-box h3{
    margin:0 0 10px;
    font-size:18px;
}

.upload-box small{
    display:block;
    color:var(--muted);
    margin-top:10px;
    line-height:1.5;
}

input[type=file]{
    width:100%;
    margin-top:15px;
    color:var(--muted);
}

.action-area{
    text-align:center;
    margin-top:30px;
}

button{
    border:none;
    background:var(--accent);
    color:white;
    padding:13px 22px;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    opacity:.9;
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
    margin-top:32px;
}

.stat{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:22px;
    text-align:center;
}

.number{
    font-size:30px;
    font-weight:700;
    margin-bottom:6px;
}

.label{
    color:var(--muted);
    font-size:14px;
}

.tabs{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:30px;
}

.tabs button{
    background:var(--surface);
    border:1px solid var(--border);
}

.active{
    background:var(--accent) !important;
    border-color:var(--accent) !important;
}

.search{
    width:100%;
    margin-top:24px;
    padding:14px 16px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    color:var(--text);
    font-size:15px;
}

.search:focus{
    outline:none;
    border-color:var(--accent);
}

.results{
    margin-top:20px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:8px;
    max-height:500px;
    overflow:auto;
}

.user{
    padding:14px 16px;
    border-bottom:1px solid var(--border);
    font-size:15px;
}

.user:last-child{
    border-bottom:none;
}

.copy-btn{
    width:100%;
    margin-top:20px;
}

@media(max-width:800px){

    .uploads{
        grid-template-columns:1fr;
    }

    .stats{
        grid-template-columns:1fr 1fr;
    }

}

@media(max-width:500px){

    .stats{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Instagram Follow Checker</h1>

<div class="subtitle">
Find who follows you back, who doesn't, and your mutuals.
</div>

<div class="uploads">

<div class="upload-box">

<div class="upload-icon">📂</div>

<h3>Followers Files</h3>

<input
type="file"
id="followers"
multiple
accept=".json">

<small>
Select all followers files
(followers_1.json, followers_2.json, etc.)
</small>

</div>

<div class="upload-box">

<div class="upload-icon">👥</div>

<h3>Following File</h3>

<input
type="file"
id="following"
accept=".json">

<small>
Select your following.json file
</small>

</div>

</div>

<div class="action-area">

<button onclick="analyze()">
Analyze Account
</button>

</div>

<div class="stats">

<div class="stat">
<div class="number" id="followersCount">0</div>
<div class="label">Followers</div>
</div>

<div class="stat">
<div class="number" id="followingCount">0</div>
<div class="label">Following</div>
</div>

<div class="stat">
<div class="number" id="notBackCount">0</div>
<div class="label">Not Following Back</div>
</div>

<div class="stat">
<div class="number" id="fansCount">0</div>
<div class="label">Fans</div>
</div>

</div>

<div class="tabs">

<button
id="btn1"
onclick="showTab('notback')">
Not Following Back
</button>

<button
id="btn2"
onclick="showTab('fans')">
Fans
</button>

<button
id="btn3"
onclick="showTab('mutual')">
Mutual
</button>

</div>

<input
class="search"
id="search"
placeholder="Search username..."
oninput="render()">

<div
class="results"
id="results">
</div>

<button
class="copy-btn"
onclick="copyResults()">
Copy Current List
</button>
</div> <!-- closes .card -->
</div> <!-- closes .container -->

<script>

let currentTab="notback";

let notBack=[];
let fans=[];
let mutual=[];

function showTab(tab){

    currentTab=tab;

    document
    .querySelectorAll(".tabs button")
    .forEach(b=>b.classList.remove("active"));

    if(tab==="notback")
        btn1.classList.add("active");

    if(tab==="fans")
        btn2.classList.add("active");

    if(tab==="mutual")
        btn3.classList.add("active");

    render();
}

async function readJSON(file){
    return JSON.parse(await file.text());
}

async function analyze(){

    try{

        const followerFiles =
            [...document
            .getElementById("followers")
            .files];

        const followingFile =
            document
            .getElementById("following")
            .files[0];

        if(
            followerFiles.length===0 ||
            !followingFile
        ){
            alert("Select files first.");
            return;
        }

        const followersSet =
            new Set();

        for(const file of followerFiles){

            const data =
                await readJSON(file);

            data.forEach(item=>{

                const user =
                    item
                    ?.string_list_data
                    ?.[0]
                    ?.value;

                if(user)
                    followersSet.add(
                        user.toLowerCase()
                    );

            });

        }

        const followingData =
            await readJSON(
                followingFile
            );

        const followingSet =
            new Set();

        (
            followingData
            .relationships_following || []
        )
        .forEach(item=>{

            if(item.title){

                followingSet.add(
                    item.title.toLowerCase()
                );

            }

        });

        notBack =
            [...followingSet]
            .filter(
                x=>!followersSet.has(x)
            )
            .sort();

        fans =
            [...followersSet]
            .filter(
                x=>!followingSet.has(x)
            )
            .sort();

        mutual =
            [...followersSet]
            .filter(
                x=>followingSet.has(x)
            )
            .sort();

        followersCount.textContent =
            followersSet.size;

        followingCount.textContent =
            followingSet.size;

        notBackCount.textContent =
            notBack.length;

        fansCount.textContent =
            fans.length;

        showTab("notback");

    }
    catch(err){

        console.error(err);

        alert(
            "Error reading files.\n\n" +
            err.message
        );
    }

}

function render(){

    let list=[];

    if(currentTab==="notback")
        list=notBack;

    if(currentTab==="fans")
        list=fans;

    if(currentTab==="mutual")
        list=mutual;

    const q =
        search.value
        .toLowerCase();

    const filtered =
        list.filter(
            x=>x.includes(q)
        );

    results.innerHTML =
        filtered.map(
            user =>
            `<div class="user">${user}</div>`
        )
        .join("");

}

function copyResults(){

    let list=[];

    if(currentTab==="notback")
        list=notBack;

    if(currentTab==="fans")
        list=fans;

    if(currentTab==="mutual")
        list=mutual;

    navigator.clipboard.writeText(
        list.join("\n")
    );

    alert("Copied!");
}

</script>

</body>
</html>
